spring.application.name=product-service

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:spring_ecom}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:#Sahil@123}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# MySQL Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Show SQL in console
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Secret Key
jwt.secret=${JWT_SECRET:7a4f2e9b1c8d3f6a0e5b7c2d9f4a1e8b3c6d0f5a2e7b4c1d8f3a6e0b9c2d5f8a}

server.port=8080

logging.level.org.springframework.web=DEBUG
logging.level.com.fasterxml.jackson=TRACE

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.version=1.0.0
info.app.developer.name=Sahil Bhandare
info.app.developer.role=Full Stack Java Developer
info.app.features=Authentication, Product Management, Cart, Wishlist, Orders, Payment Integration, Admin Dashboard
info.app.backend=Spring Boot, Spring Security, Hibernate, JPA
info.app.frontend=React.js, Axios, Bootstrap
info.app.database=MySQL